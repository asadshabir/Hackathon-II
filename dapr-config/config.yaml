apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: todoappconfig
  namespace: default
spec:
  tracing:
    samplingRate: "1"
    otel:
      endpointAddress: "jaeger:4317"
      isSecure: false
      protocol: grpc
  metric:
    enabled: true
    rules:
      - name: dapr_component_pubsub_ingress_count
        labels:
          - name: topic
      - name: dapr_component_state_count
        labels:
          - name: operation
  logging:
    apiLogging:
      enabled: true
      obfuscateURLs: false
