version: '3.8'

networks:
  todo-network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  grafana_data:
  prometheus_data:

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: todo-postgres
    environment:
      POSTGRES_DB: todoapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network
    restart: unless-stopped

  # ZooKeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: todo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - todo-network
    restart: unless-stopped

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: todo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - todo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Dapr Placement Service (required for actors)
  dapr-placement:
    image: daprio/dapr:latest
    command: ["./placement", "-port", "50005"]
    container_name: todo-dapr-placement
    ports:
      - "50005:50005"
    networks:
      - todo-network
    restart: unless-stopped

  # Jaeger for Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: todo-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "14268:14268"  # Deprecated HTTP Thrift
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - todo-network
    restart: unless-stopped

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: todo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - todo-network
    restart: unless-stopped

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana-enterprise
    container_name: todo-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: unless-stopped

  # Backend Service with Dapr Sidecar
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      dapr-placement:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/todoapp
      - KAFKA_BROKERS=kafka:9092
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PLACEMENT_HOST_ADDRESS=dapr-placement:50005
      - DAPR_CONFIG=config/dapr-config.yaml
      - DAPR_COMPONENTS_PATH=/dapr-components
    volumes:
      - ./backend:/app
      - ./dapr-components:/dapr-components
    networks:
      - todo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Dapr Sidecar
  backend-dapr:
    image: daprio/daprd:latest
    container_name: todo-backend-dapr
    command: [
      "./daprd",
      "-app-id", "backend",
      "-app-port", "8000",
      "-dapr-grpc-port", "50001",
      "-dapr-http-port", "3500",
      "-placement-host-address", "dapr-placement:50005",
      "-components-path", "/dapr-components",
      "-config", "/dapr-config/config.yaml",
      "-log-level", "info"
    ]
    depends_on:
      - backend
      - dapr-placement
    networks:
      - todo-network
    volumes:
      - ./dapr-components:/dapr-components
      - ./dapr-config:/dapr-config
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_DAPR_HTTP_PORT=3500
      - NEXT_PUBLIC_WEBSOCKET_URL=ws://localhost:8000/ws
    volumes:
      - ./frontend:/app
    networks:
      - todo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Dapr Sidecar (if needed for advanced features)
  frontend-dapr:
    image: daprio/daprd:latest
    container_name: todo-frontend-dapr
    command: [
      "./daprd",
      "-app-id", "frontend",
      "-app-port", "3000",
      "-dapr-grpc-port", "50002",
      "-dapr-http-port", "3501",
      "-placement-host-address", "dapr-placement:50005",
      "-components-path", "/dapr-components",
      "-config", "/dapr-config/config.yaml",
      "-log-level", "info"
    ]
    depends_on:
      - frontend
      - dapr-placement
    networks:
      - todo-network
    volumes:
      - ./dapr-components:/dapr-components
      - ./dapr-config:/dapr-config
    restart: unless-stopped