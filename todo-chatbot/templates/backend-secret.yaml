apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-backend-secret
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.backend.secrets.DATABASE_URL | quote }}
  GOOGLE_API_KEY: {{ .Values.backend.secrets.GOOGLE_API_KEY | quote }}
  JWT_SECRET: {{ .Values.backend.secrets.JWT_SECRET | quote }}
