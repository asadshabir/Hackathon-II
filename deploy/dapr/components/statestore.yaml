apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: todo-app
spec:
  type: state.postgresql
  version: v1
  metadata:
    - name: connectionString
      secretKeyRef:
        name: db-credentials
        key: connection-string
    - name: tableName
      value: "dapr_state"
    - name: keyPrefix
      value: "name"
auth:
  secretStore: kubernetes